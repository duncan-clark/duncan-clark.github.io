# --- Comments ---
disqus: "duncan-clark-github-io"

staticman:
  repository :
  branch     : master
  endpoint   :
  reCaptcha:
    siteKey  :
    secret   :

# --- Blog pagination ---
permalink: /:year-:month-:day-:title/
paginate: 3
paginate_path: "/blog/page:num/"

